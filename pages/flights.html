  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <header class="header">
    <div class="container">
      <a href="../index.html" class="brand"><span class="logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12l20-8-8 20-2-8-10-4z"/></svg></span>GoTravel <span style="color:var(--teal-dark)">Mart</span></a>
      <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="destinations.html">Destinations</a>
        <a href="../index.html#packages">Packages</a>
        <a href="flights.html" class="active">Flights</a>
        <a href="hotels.html">Hotels</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <button class="icon-btn" data-toggle-dark><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <a class="btn btn-primary btn-sm" href="tel:+919876543210">Call Now</a>
        <button class="icon-btn mobile-toggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <div class="breadcrumbs"><a href="../index.html">Home</a> / Flights</div>
      <h1>Find the Best Flight Deals</h1>

      <div class="search-widget" style="background:rgba(255,255,255,.5);border-color:var(--ink-100);box-shadow:var(--shadow-md);margin-top:20px">
        <div class="search-tabs">
          <button class="active">Flights</button>
        </div>
        <form class="search-fields" id="flight-search">
          <div class="field"><label>From (airport code)</label><input id="f-from" list="airports" value="DEL" placeholder="DEL" required></div>
          <div class="field"><label>To (airport code)</label><input id="f-to" list="airports" value="GOI" placeholder="GOI" required></div>
          <div class="field"><label>Departure</label><input id="f-date" type="date" required></div>
          <div class="field"><label>Travellers</label>
            <select id="f-adults"><option value="1">1 Adult</option><option value="2" selected>2 Adults</option><option value="3">3 Adults</option><option value="4">4 Adults</option></select>
          </div>
          <button class="btn btn-primary" type="submit">Search flights</button>
          <datalist id="airports"></datalist>
        </form>
      </div>
    </div>
  </section>

  <section style="padding-top:40px">
    <div class="container">
      <div class="with-sidebar">
        <aside class="filters">
          <h4>Filter Results</h4>
          <div class="filter-group">
            <strong style="display:block;margin-bottom:8px;font-size:.95rem">Stops</strong>
            <label><input type="checkbox" checked> Non-stop (12)</label>
            <label><input type="checkbox" checked> 1 Stop (38)</label>
            <label><input type="checkbox"> 2+ Stops (14)</label>
          </div>
          <div class="filter-group">
            <strong style="display:block;margin-bottom:8px;font-size:.95rem">Price (₹)</strong>
            <input type="range" min="25000" max="120000" value="65000">
            <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--ink-500)"><span>₹25K</span><span>₹1.2L</span></div>
          </div>
          <div class="filter-group">
            <strong style="display:block;margin-bottom:8px;font-size:.95rem">Airlines</strong>
            <label><input type="checkbox" checked> IndiGo</label>
            <label><input type="checkbox" checked> Air India</label>
            <label><input type="checkbox"> Singapore Airlines</label>
            <label><input type="checkbox"> Emirates</label>
            <label><input type="checkbox"> Thai Airways</label>
            <label><input type="checkbox"> Malaysia Airlines</label>
          </div>
          <div class="filter-group">
            <strong style="display:block;margin-bottom:8px;font-size:.95rem">Departure Time</strong>
            <label><input type="checkbox"> Early (00–06)</label>
            <label><input type="checkbox" checked> Morning (06–12)</label>
            <label><input type="checkbox" checked> Afternoon (12–18)</label>
            <label><input type="checkbox"> Night (18–24)</label>
          </div>
        </aside>

        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px">
            <strong id="flt-summary">Search to see live flights</strong>
            <select id="flt-sort" style="padding:10px 14px;border-radius:10px;border:1px solid var(--ink-100)"><option value="price">Sort: Cheapest</option><option value="duration">Fastest</option></select>
          </div>
          <div id="flt-results"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer" style="margin-top:80px"><div class="container"><div class="footer-bottom" style="border-top:0"><span>© 2026 GoTravel Mart Pvt. Ltd.</span><div><a href="#">Privacy</a><a href="#">Terms</a><a href="contact.html">Contact</a></div></div></div></footer>

  <div class="floating"><a class="wa" href="https://wa.me/919876543210"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1l-.9 1.1c-.2.2-.4.3-.7.1-1-.5-2-1.1-2.8-2-.2-.3-.1-.4 0-.6.2-.2.4-.5.6-.7.2-.2.2-.4.1-.6l-.8-1.9c-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2 3.1 4.9 4.3 2.4 1 2.9.8 3.4.7.5-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.3c1.4.8 3 1.2 4.8 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg></a></div>

  <script src="../js/main.js"></script>
  <script>
  (function () {
    const $ = s => document.querySelector(s);
    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const inr = n => '₹' + Number(n || 0).toLocaleString('en-IN');
    const hhmm = iso => (iso || '').slice(11, 16);
    let results = [];

    // default date = 7 days out
    $('#f-date').value = new Date(Date.now() + 7 * 864e5).toISOString().slice(0, 10);
    $('#f-date').min = new Date().toISOString().slice(0, 10);

    // airport autocomplete
    let acTimer;
    function autocomplete(val) {
      clearTimeout(acTimer);
      acTimer = setTimeout(async () => {
        if (!val || val.length < 2) return;
        try {
          const list = await (await fetch('/api/locations?keyword=' + encodeURIComponent(val))).json();
          $('#airports').innerHTML = list.map(l => `<option value="${l.iata}">${esc(l.city)} (${l.iata})</option>`).join('');
        } catch {}
      }, 200);
    }
    $('#f-from').addEventListener('input', e => autocomplete(e.target.value));
    $('#f-to').addEventListener('input', e => autocomplete(e.target.value));

    function render() {
      const sort = $('#flt-sort').value;
      const sorted = [...results].sort((a, b) => sort === 'duration'
        ? (a.segments.reduce((s, x) => s, 0), a.duration.localeCompare(b.duration))
        : a.price.amount - b.price.amount);
      $('#flt-results').innerHTML = sorted.map((f, i) => `
        <article class="result-card flight-card">
          <div class="airline"><div class="badge">${esc(f.airlineCode)}</div><span style="font-size:.8rem;color:var(--ink-500)">${esc(f.airline)}</span></div>
          <div>
            <div class="flight-route">
              <div><div class="time">${hhmm(f.departAt)}</div><div class="code">${esc(f.from)}</div></div>
              <div><div style="font-size:.78rem;text-align:center;color:var(--ink-500)">${esc(f.duration)} · ${f.stops ? f.stops + ' stop' : 'non-stop'}</div><div class="line"></div><div style="font-size:.78rem;text-align:center;color:var(--ink-500)">${esc(f.flightNumber)}</div></div>
              <div><div class="time">${hhmm(f.arriveAt)}</div><div class="code">${esc(f.to)}</div></div>
            </div>
          </div>
          <div class="fare">
            <strong>${inr(f.price.amount)}</strong>
            <span>total</span>
            <button class="btn btn-primary btn-sm" data-book="${i}">Book Now</button>
          </div>
        </article>`).join('');
      $('#flt-results').querySelectorAll('[data-book]').forEach(b => b.addEventListener('click', () => book(sorted[+b.dataset.book])));
    }

    function book(offer) {
      sessionStorage.setItem('gtm_checkout', JSON.stringify({ type: 'flight', offer }));
      location.href = 'checkout.html';
    }

    $('#flight-search').addEventListener('submit', async e => {
      e.preventDefault();
      const body = {
        origin: $('#f-from').value.trim().toUpperCase(),
        destination: $('#f-to').value.trim().toUpperCase(),
        date: $('#f-date').value,
        adults: Number($('#f-adults').value),
      };
      $('#flt-summary').textContent = 'Searching…';
      $('#flt-results').innerHTML = '';
      try {
        const r = await (await fetch('/api/flights/search', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) })).json();
        results = r.data || [];
        $('#flt-summary').textContent = `${results.length} flights · ${body.origin} → ${body.destination}` + (r.mode === 'demo' ? '  (demo data — add Amadeus keys for live fares)' : '');
        render();
      } catch (err) {
        $('#flt-summary').textContent = 'Search failed: ' + err.message;
      }
    });
    $('#flt-sort').addEventListener('change', render);

    // auto-run an initial search
    $('#flight-search').dispatchEvent(new Event('submit'));
  })();
  </script>
</body>
</html>

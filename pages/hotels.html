</head>
<body>

  <header class="header">
    <div class="container">
      <a href="../index.html" class="brand"><span class="logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12l20-8-8 20-2-8-10-4z"/></svg></span>GoTravel <span style="color:var(--teal-dark)">Mart</span></a>
      <nav class="nav">
        <a href="../index.html">Home</a>
        <a href="destinations.html">Destinations</a>
        <a href="../index.html#packages">Packages</a>
        <a href="flights.html">Flights</a>
        <a href="hotels.html" class="active">Hotels</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <button class="icon-btn" data-toggle-dark><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <a class="btn btn-primary btn-sm" href="tel:+919876543210">Call Now</a>
        <button class="icon-btn mobile-toggle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <div class="breadcrumbs"><a href="../index.html">Home</a> / Hotels</div>
      <h1>Find Hotels You'll Love</h1>

      <div class="search-widget" style="background:rgba(255,255,255,.5);border-color:var(--ink-100);box-shadow:var(--shadow-md);margin-top:20px">
        <form class="search-fields" id="hotel-search">
          <div class="field"><label>City code</label><input id="h-city" list="cities" value="GOI" placeholder="GOI" required></div>
          <div class="field"><label>Check-in</label><input id="h-in" type="date" required></div>
          <div class="field"><label>Check-out</label><input id="h-out" type="date" required></div>
          <div class="field"><label>Guests</label>
            <select id="h-adults"><option value="1">1 Adult</option><option value="2" selected>2 Adults</option><option value="3">3 Adults</option><option value="4">4 Adults</option></select>
          </div>
          <button class="btn btn-primary" type="submit">Search hotels</button>
          <datalist id="cities"></datalist>
        </form>
      </div>
    </div>
  </section>

  <section style="padding-top:40px">
    <div class="container">
      <div class="with-sidebar">
        <aside class="filters">
          <h4>Filter</h4>
          <div class="filter-group">
            <strong style="display:block;margin-bottom:8px;font-size:.95rem">Price per night (₹)</strong>
            <input type="range" min="2000" max="50000" value="15000">
            <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--ink-500)"><span>₹2K</span><span>₹50K</span></div>
          </div>
          <div class="filter-group">
            <strong style="display:block;margin-bottom:8px;font-size:.95rem">Star Rating</strong>
            <label><input type="checkbox"> 5 Star ★★★★★</label>
            <label><input type="checkbox" checked> 4 Star ★★★★</label>
            <label><input type="checkbox" checked> 3 Star ★★★</label>
            <label><input type="checkbox"> 2 Star ★★</label>
          </div>
          <div class="filter-group">
            <strong style="display:block;margin-bottom:8px;font-size:.95rem">Amenities</strong>
            <label><input type="checkbox" checked> Free WiFi</label>
            <label><input type="checkbox"> Pool</label>
            <label><input type="checkbox" checked> Breakfast Incl.</label>
            <label><input type="checkbox"> Spa</label>
            <label><input type="checkbox"> Pet Friendly</label>
            <label><input type="checkbox"> Free Parking</label>
            <label><input type="checkbox"> Beach Front</label>
          </div>
          <div class="filter-group">
            <strong style="display:block;margin-bottom:8px;font-size:.95rem">Guest Rating</strong>
            <label><input type="checkbox"> Excellent (9+)</label>
            <label><input type="checkbox" checked> Very Good (8+)</label>
            <label><input type="checkbox"> Good (7+)</label>
          </div>
        </aside>

        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px">
            <strong id="htl-summary">Search to see live hotels</strong>
            <select id="htl-sort" style="padding:10px 14px;border-radius:10px;border:1px solid var(--ink-100)"><option value="price">Price: Low → High</option><option value="rating">Rating</option></select>
          </div>
          <div id="htl-results"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer" style="margin-top:80px"><div class="container"><div class="footer-bottom" style="border-top:0"><span>© 2026 GoTravel Mart Pvt. Ltd.</span><div><a href="#">Privacy</a><a href="#">Terms</a><a href="contact.html">Contact</a></div></div></div></footer>

  <div class="floating"><a class="wa" href="https://wa.me/919876543210"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1l-.9 1.1c-.2.2-.4.3-.7.1-1-.5-2-1.1-2.8-2-.2-.3-.1-.4 0-.6.2-.2.4-.5.6-.7.2-.2.2-.4.1-.6l-.8-1.9c-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2 3.1 4.9 4.3 2.4 1 2.9.8 3.4.7.5-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5.2-1.3c1.4.8 3 1.2 4.8 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg></a></div>

  <script src="../js/store.js"></script>
  <script src="../js/main.js"></script>
  <script>
  (function () {
    const $ = s => document.querySelector(s);
    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const inr = n => '₹' + Number(n || 0).toLocaleString('en-IN');
    const BGS = ['bg-bali','bg-maldives','bg-thailand','bg-singapore','bg-vietnam','bg-goa','bg-kerala'];
    let results = [];

    const today = new Date().toISOString().slice(0, 10);
    $('#h-in').value = new Date(Date.now() + 7 * 864e5).toISOString().slice(0, 10);
    $('#h-out').value = new Date(Date.now() + 10 * 864e5).toISOString().slice(0, 10);
    $('#h-in').min = today; $('#h-out').min = today;

    let acTimer;
    $('#h-city').addEventListener('input', e => {
      clearTimeout(acTimer);
      acTimer = setTimeout(async () => {
        const v = e.target.value;
        if (!v || v.length < 2) return;
        try {
          const list = await gtmApi('GET', '/locations?keyword=' + encodeURIComponent(v));
          $('#cities').innerHTML = list.map(l => `<option value="${l.iata}">${esc(l.city)} (${l.iata})</option>`).join('');
        } catch {}
      }, 200);
    });

    function render() {
      const sort = $('#htl-sort').value;
      const sorted = [...results].sort((a, b) => sort === 'rating'
        ? (Number(b.rating) || 0) - (Number(a.rating) || 0)
        : (a.price?.amount || 0) - (b.price?.amount || 0));
      $('#htl-results').innerHTML = sorted.map((h, i) => `
        <article class="result-card hotel-card">
          <div class="photo ${BGS[i % BGS.length]}"></div>
          <div>
            <div style="display:flex;align-items:center;gap:8px"><span style="color:var(--gold)">${'★'.repeat(Number(h.rating) || 3)}</span><span style="font-size:.78rem;color:var(--ink-500);background:var(--bg-soft);padding:3px 8px;border-radius:6px">${esc(h.rating || '3')}★</span></div>
            <h3>${esc(h.name)}</h3>
            <span style="color:var(--ink-500);font-size:.9rem">📍 ${esc(h.cityCode || '')} · ${esc(h.room || 'Room')}</span>
            <div class="amenities"><span>🛏 ${esc(h.room || 'Room')}</span><span>📅 ${esc(h.checkIn || '')} → ${esc(h.checkOut || '')}</span></div>
          </div>
          <div class="fare">
            <strong>${h.price ? inr(h.price.amount) : '—'}</strong>
            <span class="per">total stay · incl. taxes</span>
            <button class="btn btn-primary btn-sm" data-book="${i}">Reserve</button>
          </div>
        </article>`).join('');
      $('#htl-results').querySelectorAll('[data-book]').forEach(b => b.addEventListener('click', () => book(sorted[+b.dataset.book])));
    }

    function book(offer) {
      sessionStorage.setItem('gtm_checkout', JSON.stringify({ type: 'hotel', offer }));
      location.href = 'checkout.html';
    }

    $('#hotel-search').addEventListener('submit', async e => {
      e.preventDefault();
      const body = { cityCode: $('#h-city').value.trim().toUpperCase(), checkIn: $('#h-in').value, checkOut: $('#h-out').value, adults: Number($('#h-adults').value) };
      $('#htl-summary').textContent = 'Searching…';
      $('#htl-results').innerHTML = '';
      try {
        const r = await gtmApi('POST', '/hotels/search', body);
        results = r.data || [];
        $('#htl-summary').textContent = `${results.length} hotels · ${body.cityCode}` + (r.mode === 'demo' ? '  (demo data — add Amadeus keys for live rates)' : '');
        render();
      } catch (err) {
        $('#htl-summary').textContent = 'Search failed: ' + err.message;
      }
    });
    $('#htl-sort').addEventListener('change', render);

    $('#hotel-search').dispatchEvent(new Event('submit'));
  })();
  </script>
</body>
</html>
